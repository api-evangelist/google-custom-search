aid: google-custom-search
name: Google Custom Search
description: >-
  The Google Custom Search JSON API allows programmatic searches over a website
  or collection of websites. It returns metadata about the search performed,
  metadata about the search engine used, and the search results including web
  pages and images.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
